        function closeCustomDropdown() {
            const dropdownList = document.getElementById("dropdownList");
            const customDropdown = document.getElementById("customDropdown");
            const dropdownArrow = document.querySelector(".dropdown-arrow");

            if (!dropdownList || !customDropdown || !dropdownArrow) {
                console.warn('?? closeCustomDropdown: Some dropdown elements not found');
                return;
            }

            dropdownList.classList.remove("show");
            customDropdown.classList.remove("active");
            dropdownArrow.style.transform = "translateY(-50%) rotate(0deg)";

            // Clear focus from items
            dropdownList.querySelectorAll('.dropdown-item').forEach(item => {
                item.classList.remove('focused');
            });
        }

        function focusNextItem(currentIndex) {
            const dropdownList = document.getElementById("dropdownList");
            if (!dropdownList) return;
            
            const items = Array.from(dropdownList.querySelectorAll('.dropdown-item'));
            const nextIndex = currentIndex + 1;

            items.forEach(item => item.classList.remove('focused'));

            if (nextIndex < items.length) {
                items[nextIndex].classList.add('focused');
                items[nextIndex].scrollIntoView({ block: 'nearest' });
            }
        }

        function focusPrevItem(currentIndex) {
            const dropdownList = document.getElementById("dropdownList");
            if (!dropdownList) return;
            
            const items = Array.from(dropdownList.querySelectorAll('.dropdown-item'));
            const prevIndex = currentIndex - 1;

            items.forEach(item => item.classList.remove('focused'));

            if (prevIndex >= 0) {
                items[prevIndex].classList.add('focused');
                items[prevIndex].scrollIntoView({ block: 'nearest' });
            }
        }

                            renderHexagonView(); // This will now consider all filters: search, domain, and method
                            break;
                        case 'card':
                            renderCardView(); // This will now consider all filters: search, domain, and method
                            break;
                        default:
                            // Fallback to direct hexagon filtering for compatibility
                            filterHexagonsDirectly(trimmedQuery);
                            break;
                    }

                    // Show/hide no results message
                    const visibleCount = getVisibleItemsCount();
                    showNoResultsMessage(visibleCount === 0 && (trimmedQuery || activeDomains.size > 0));

                switch (currentView) {
                    case 'hexagon':
                        return document.querySelectorAll('.hexagon-item:not(.domain-filtered-out)').length;
                    case 'card':
                        return document.querySelectorAll('.api-card').length;

            // Real-time hexagon filtering function with consistent behavior
            function filterHexagonsDirectly(query) {
                const hexagons = document.querySelectorAll('.hexagon-item');
                let visibleCount = 0;

                // Use RAF for smooth rendering with immediate, consistent behavior
                requestAnimationFrame(() => {
                    hexagons.forEach((hexagon, index) => {
                        const api = allApis[index];
                        if (!api) return;

                        const serviceName = extractServiceName(api.name);
                        const domain = extractDomain(api.name);

                        // Check if matches search query
                        const matchesQuery = !query ||
                            serviceName.toLowerCase().includes(query) ||
                            api.name.toLowerCase().includes(query) ||
                            domain.toLowerCase().includes(query);

                        // Check if matches domain filter
                        const matchesDomain = activeDomains.size === 0 || activeDomains.has(domain);

                        // Show only if matches search and domain conditions
                        const shouldShow = matchesQuery && matchesDomain;

                        if (shouldShow) {
                            // Show immediately and cleanly - no position memory
                            hexagon.classList.remove('domain-filtered-out');
                            hexagon.classList.add('domain-filtered-in');
                            hexagon.style.display = 'block';
                            hexagon.style.visibility = 'visible';
                            hexagon.style.position = 'relative';
                            hexagon.style.opacity = '1';
                            hexagon.style.transform = 'scale(1) translateY(0)';
                            hexagon.style.filter = 'none';
                            visibleCount++;

                            // Highlight matching text in hexagon
                            if (query) {
                                highlightHexagonText(hexagon, query, serviceName);
                            } else {
                                clearHexagonHighlight(hexagon);
                            }
                        } else {
                            // Hide immediately and cleanly like card view
                            hexagon.classList.remove('domain-filtered-in');
                            hexagon.classList.add('domain-filtered-out');
                            hexagon.style.display = 'none';
                            hexagon.style.visibility = 'hidden';
                            hexagon.style.opacity = '0';

                            clearHexagonHighlight(hexagon);
                        }
                    });

                    // Update counter
                    updateViewCounter(visibleCount, query);

                    // Show "no results" message if needed
                    showNoResultsMessage(visibleCount === 0 && (query || activeDomains.size > 0));
                });
            }

                const titleElement = hexagon.querySelector('.hexagon-title');

                if (titleElement && !titleElement.dataset.originalText) {
                    titleElement.dataset.originalText = displayName || titleElement.textContent;
                }

                if (titleElement && titleElement.dataset.originalText) {
                    titleElement.innerHTML = highlightMatch(titleElement.dataset.originalText, query);

                const titleElement = hexagon.querySelector('.hexagon-title');

            input.addEventListener("keydown", function (e) {
                const items = list.querySelectorAll(".autocomplete-item");
                let selectedIndex = Array.from(items).findIndex(item => item.classList.contains("selected"));
                if (e.key === "ArrowDown") {
                    e.preventDefault();
                    if (selectedIndex < items.length - 1) {
                        if (selectedIndex >= 0) items[selectedIndex].classList.remove("selected");
                        items[selectedIndex + 1].classList.add("selected");
                    }
                } else if (e.key === "ArrowUp") {
                    e.preventDefault();
                    if (selectedIndex > 0) {
                        items[selectedIndex].classList.remove("selected");
                        items[selectedIndex - 1].classList.add("selected");
                    }
                } else if (e.key === "Enter") {
                    e.preventDefault();
                    if (selectedIndex >= 0 && items[selectedIndex].onclick) {
                        items[selectedIndex].click();
                    }
                } else if (e.key === "Escape") {
                    hideAutocomplete();
                    input.blur();
                }
            });
            document.addEventListener("click", e => {
                if (!list.contains(e.target) && e.target !== input) {
                    hideAutocomplete();
                }
            });
        }

        // Ripple effect function
        function createRippleEffect(element, event) {
            const ripple = document.createElement('span');
            const rect = element.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = event ? event.clientX - rect.left - size / 2 : rect.width / 2 - size / 2;
            const y = event ? event.clientY - rect.top - size / 2 : rect.height / 2 - size / 2;

            ripple.style.cssText = `
        position: absolute;
        border-radius: 50%;
        transform: scale(0);
        animation: ripple 0.6s linear;
        background-color: rgba(14, 165, 233, 0.3);
        left: ${x}px;
        top: ${y}px;
        width: ${size}px;
        height: ${size}px;
        pointer-events: none;
        z-index: 1;
    `;

            element.style.position = 'relative';
            element.style.overflow = 'hidden';
            element.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 600);
        }

        // Setup filter settings dropdown toggle
        function setupFilterSettingsDropdown() {
            const settingsBtn = document.getElementById('filterSettingsBtn');
            const settingsDropdown = document.getElementById('filterSettingsDropdown');
            
            if (!settingsBtn || !settingsDropdown) return;
            
            // Move dropdown to body to escape backdrop-filter stacking context
            if (settingsDropdown.parentElement !== document.body) {
                document.body.appendChild(settingsDropdown);
            }
            
            // Function to position dropdown centered below the button
            function positionFilterDropdown() {
                const btnRect = settingsBtn.getBoundingClientRect();
                const dropdownWidth = 280; // Match CSS width
                
                // Calculate centered position
                let left = btnRect.left + (btnRect.width / 2) - (dropdownWidth / 2);
                
                // Ensure it doesn't go off the right edge (with 16px margin)
                const rightEdge = window.innerWidth - 16;
                if (left + dropdownWidth > rightEdge) {
                    left = rightEdge - dropdownWidth;
                }
                
                // Ensure it doesn't go off the left edge
                if (left < 16) {
                    left = 16;
                }
                
                // Calculate max height based on viewport
                const maxHeight = window.innerHeight - btnRect.bottom - 24;
                
                // Position below button
                const top = btnRect.bottom + 8;
                settingsDropdown.style.top = top + 'px';
                settingsDropdown.style.left = left + 'px';
                settingsDropdown.style.right = 'auto';
                settingsDropdown.style.maxHeight = Math.min(400, maxHeight) + 'px';
            }
            
            settingsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isVisible = settingsDropdown.style.display === 'block';
                
                // Close domain dropdown if open (mutual exclusivity)
                const domainDropdown = document.getElementById('domainDropdownList');
                const domainBtn = document.getElementById('domainFilterTrigger');
                if (domainDropdown && domainDropdown.classList.contains('show')) {
                    domainDropdown.classList.remove('show');
                    if (domainBtn) domainBtn.classList.remove('active');
                }
                
                if (!isVisible) {
                    positionFilterDropdown();
                    settingsDropdown.style.display = 'block';
                    settingsBtn.classList.add('active');
                    
                    // Populate appropriate chips based on current view
                    if (endpointFilteringEnabled && !isLandingPage) {
                        populateFilterDropdownEndpointChips();
                    } else {
                        populateFilterDropdownDomainChips();
                    }
                } else {
                    settingsDropdown.style.display = 'none';
                    settingsBtn.classList.remove('active');
                }
            });
            
            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!settingsBtn.contains(e.target) && !settingsDropdown.contains(e.target)) {
                    settingsDropdown.style.display = 'none';
                    settingsBtn.classList.remove('active');
                }
            });
            
            // Prevent dropdown from closing when clicking inside it
            settingsDropdown.addEventListener('click', (e) => {
                e.stopPropagation();
            });
            
            // Reposition on scroll/resize
            window.addEventListener('scroll', () => {
                if (settingsDropdown.style.display === 'block') {
                    positionFilterDropdown();
                }
            }, true);
            
            window.addEventListener('resize', () => {
                if (settingsDropdown.style.display === 'block') {
                    positionFilterDropdown();
                }
            });
        }

        // ============================================================
        // COLLAPSIBLE RESPONSE/REQUEST BODY FEATURE
        // ============================================================
        // Automatically collapses long response/request bodies and adds
        // a "Show more" button for better UX when dealing with large DTOs
        // ============================================================
        
        const COLLAPSIBLE_CONFIG = {
            maxCollapsedHeight: 200, // pixels
            minContentHeightToCollapse: 250, // Only collapse if content is taller than this
            lineThreshold: 15, // Approximate lines before collapsing
            debounceDelay: 150, // Debounce delay for observer processing
        };
        
        // Track processed elements to avoid duplicate processing
        const processedBodies = new WeakSet();
        
        // FIXED: More specific selectors to avoid matching parent containers
        // We want to target the INNERMOST code block, not parent containers
        const COLLAPSIBLE_SELECTORS = [
            // Target specific code blocks within response sections
            '.response-col_description pre.microlight',
            '.response-col_description code.microlight', 
            '.live-responses-table pre.microlight',
            '.live-responses-table code.microlight',
            // Curl command pre blocks
            '.curl-command pre',
            // Request body textarea/code
            '.request-body-content .body-param__text'
        ];
        const COLLAPSIBLE_SELECTOR_STRING = COLLAPSIBLE_SELECTORS.join(', ');
        
        // Pre-compiled class checks for MutationObserver (faster than repeated string comparisons)
        const COLLAPSIBLE_TRIGGER_CLASSES = new Set([
            'responses-inner',
            'live-responses-table', 
            'response',
            'highlight-code',
            'microlight',
            'curl-command'
        ]);
        
        /**
         * Initialize a MutationObserver to watch for new response/request bodies
         * OPTIMIZED: Uses batched processing and efficient class checking
         */
        function initCollapsibleBodyObserver(container) {
            if (!container) return;
            
            console.log('?? Initializing collapsible body observer...');
            
            // Process any existing bodies
            processExistingBodies(container);
            
            // Debounced processing function
            const debouncedProcess = debounce(() => {
                processExistingBodies(container);
            }, COLLAPSIBLE_CONFIG.debounceDelay);
            
            // Watch for new content (responses from Try It Out)
            const observer = new MutationObserver((mutations) => {
                // Use a flag to batch process - avoids multiple calls
                let shouldProcess = false;
                
                // Optimized loop - break early when found
                outer: for (let i = 0; i < mutations.length; i++) {
                    const mutation = mutations[i];
                    if (mutation.type === 'childList' && mutation.addedNodes.length > 0) {
                        const nodes = mutation.addedNodes;
                        for (let j = 0; j < nodes.length; j++) {
                            const node = nodes[j];
                            if (node.nodeType === Node.ELEMENT_NODE) {
                                // Fast class check using Set lookup
                                const classList = node.classList;
                                if (classList) {
                                    for (let k = 0; k < classList.length; k++) {
                                        if (COLLAPSIBLE_TRIGGER_CLASSES.has(classList[k])) {
                                            shouldProcess = true;
                                            break outer;
                                        }
                                    }
                                }
                                // Only do expensive querySelector if class check failed
                                if (!shouldProcess && node.querySelector) {
                                    if (node.querySelector('.highlight-code, .microlight')) {
                                        shouldProcess = true;
                                        break outer;
                                    }
                                }
                            }
                        }
                    }
                }
                
                if (shouldProcess) {
                    debouncedProcess();
                }
            });
            
            observer.observe(container, {
                childList: true,
                subtree: true
            });
            
            console.log('? Collapsible body observer initialized');
        }
        
        /**
         * Find and process all response/request body elements
         * OPTIMIZED: Uses single querySelectorAll with combined selector
         * FIXED: Deduplicates elements to prevent processing same element twice
         */
        function processExistingBodies(container) {
            // Use combined selector for single DOM query (much faster)
            const elements = container.querySelectorAll(COLLAPSIBLE_SELECTOR_STRING);
            
            // Use Set to deduplicate - some selectors might match the same element
            const uniqueElements = new Set();
            
            for (let i = 0; i < elements.length; i++) {
                const el = elements[i];
                // Skip if already in a wrapper or already processed
                if (!el.closest('.collapsible-outer-wrapper') && 
                    !el.classList.contains('collapsible-enabled') &&
                    !processedBodies.has(el)) {
                    uniqueElements.add(el);
                }
            }
            
            // Process unique elements only
            uniqueElements.forEach(el => makeCollapsible(el));
            
            // Also add unified buttons to small code blocks that won't be collapsible
            addUnifiedButtonsToSmallCodeBlocks(container);
        }

        /**
         * Make a single element collapsible if it's tall enough
         * FIXED: More defensive checks to prevent processing parent containers
         */
        function makeCollapsible(element) {
            if (!element || processedBodies.has(element)) return;

            if (element.classList.contains('collapsible-enabled')) return;

                return;

            if (contentHeight < COLLAPSIBLE_CONFIG.minContentHeightToCollapse) return;

            processedBodies.add(element);

            // Header morph on scroll
            let lastScrollTop = 0;
            let scrollThreshold = 80;
            let ticking = false;

            function handleHeaderScroll() {
                const header = document.querySelector('header');
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

                // Calculate scroll progress
                const windowHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrollProgress = (scrollTop / windowHeight) * 100;
                // Update CSS variable for progress bar
                header.style.setProperty('--scroll-progress', `${scrollProgress}%`);

                if (scrollTop > scrollThreshold) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }

                lastScrollTop = scrollTop;
                ticking = false;
            }
            window.addEventListener('scroll', function () {
                if (!ticking) {
                    window.requestAnimationFrame(handleHeaderScroll);
                    ticking = true;
                }
            }, { passive: true });

            let resizeTimeout;
            let lastWindowWidth = window.innerWidth;

                    const currentWidth = window.innerWidth;
                    // Only re-render if width changed significantly (more than 50px)

                    if (Math.abs(currentWidth - lastWindowWidth) < 50) {

    <script>
        // Keep the endpoint filter fixed under the header and provide a collapse/expand toggle.
        (function () {
            const root = document.documentElement;
            const header = document.querySelector('header');
            const bar = document.getElementById('endpointFilterBar');
            const toggle = document.getElementById('endpointCollapseToggle');
            function updateVars() {
                if (!header) return;
                // Use getBoundingClientRect().bottom to compute the exact position
                // of the header bottom in viewport coordinates. This keeps the
                // endpoint bar glued to the header even during animations.
                const rect = header.getBoundingClientRect();
                const headerBottom = Math.max(0, rect.bottom);
                root.style.setProperty('--navbar-height', headerBottom + 'px');

                // Set the fixed bar top directly to avoid any timing gaps
                if (bar) {
                    try {
                        bar.style.top = headerBottom + 'px';
                        root.style.setProperty('--endpoint-bar-height', bar.offsetHeight + 'px');
                    } catch (e) {
                        // ignore DOM exceptions
                    }
                }
            }
            // Observe header attribute changes (class toggles when morphing) so the bar stays glued to its bottom.
            try {
                if (header && window.MutationObserver) {
                    const headerObserver = new MutationObserver(() => {
                        // header class or style changed (morphed/unmorphed) -> update CSS vars
                        updateVars();
                    });
                    headerObserver.observe(header, { attributes: true, attributeFilter: ['class', 'style'] });
                }

                // ResizeObserver watches for changes to header size during animations
                if (header && window.ResizeObserver) {
                    const ro = new ResizeObserver(() => updateVars());
                    ro.observe(header);
                }
            } catch (e) {
                // ignore if observers unavailable
            }
            // Also update on scroll using rAF to catch transitions that change header height
            let varTicking = false;
            window.addEventListener('scroll', function () {
                if (!varTicking) {
                    window.requestAnimationFrame(() => {
                        updateVars();
                        varTicking = false;
                    });
                    varTicking = true;
                }
            }, { passive: true });
            
            function setCollapsed(collapsed) {
                if (!bar) return;
                if (collapsed) {
                    bar.classList.add('collapsed');
                    if (toggle) {
                        toggle.setAttribute('aria-expanded', 'false');
                        toggle.innerHTML = '<i class="fas fa-chevron-down" aria-hidden="true"></i>';
                    }
                } else {
                    bar.classList.remove('collapsed');
                    if (toggle) {
                        toggle.setAttribute('aria-expanded', 'true');
                        toggle.innerHTML = '<i class="fas fa-chevron-up" aria-hidden="true"></i>';
                    }
                }
                try { localStorage.setItem('endpointFilterCollapsed', collapsed ? '1' : '0'); } catch (e) { }
                // update dimensions after state change and adjust swagger UI padding
                setTimeout(() => {
                    updateVars();
                    try { setSwaggerUiPaddingForFilterBar(true); } catch (e) { }
                }, 120);
            }
            if (toggle) {
                toggle.addEventListener('click', () => {
                    setCollapsed(!bar.classList.contains('collapsed'));
                });
            }

            window.addEventListener('resize', updateVars);
            // initialize after DOM ready
            document.addEventListener('DOMContentLoaded', () => {
                updateVars();
                try {
                    const saved = localStorage.getItem('endpointFilterCollapsed');
                    if (saved === '1') setCollapsed(true);
                    else setCollapsed(false);
                } catch (e) {
                    // ignore
                }
                // run again after a short delay to account for header animations
                setTimeout(updateVars, 300);
            });
        })();
    </script>

    <script>
        (function () {
            const btn = document.getElementById('scrollTopBtn');
            if (!btn) return;
            let ticking = false;

            function updateVisibility() {
                const showAfter = 240; // px scrolled before showing
                if (window.scrollY > showAfter) {
                    btn.classList.add('visible');
                } else {
                    btn.classList.remove('visible');
                }
                ticking = false;
            }

            window.addEventListener('scroll', function () {
                if (!ticking) {
                    window.requestAnimationFrame(updateVisibility);
                    ticking = true;
                }
            }, { passive: true });

            // show immediately if already scrolled
            document.addEventListener('DOMContentLoaded', updateVisibility);
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                // hide button while scrolling to top
                btn.classList.remove('visible');
            });

            // keyboard accessibility
            btn.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    btn.click();
                }
            });
        })();
